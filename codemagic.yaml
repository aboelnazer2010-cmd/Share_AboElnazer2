# ملف إعدادات بناء تطبيق ShareMobileApp آلياً
workflows:
  react-native-android:
    name: Build Android APK
    max_build_duration: 60
    instance_type: mac_mini_m1 # أو linux لسرعة أكبر
    working_directory: ShareMobileApp # تحديد مكان التطبيق الرئيسي
    environment:
      node: 22
      java: 17
      groups:
        - android-signing # إذا أردت إضافة مفاتيح التوقيع لاحقاً
    scripts:
      - name: Install dependencies for App
        script: |
          npm install
      - name: Install dependencies for Node.js Server
        script: |
          cd nodejs-assets/nodejs-project && npm install
      - name: Build Android APK
        script: |
          cd android && chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - YOUR_EMAIL@example.com # ضع إيميلك هنا لتستلم الرابط
